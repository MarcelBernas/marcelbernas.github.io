<!DOCTYPE html>
<html>
    <head>
        <style>
            div
            {
            background-color: #ffff99;
            border: 5px solid black;
            color:red;
            font-size:  42px;
            width: 900px;
            height: 150px;
            margin-left:auto;
            margin-right: auto;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div style="background-image:url(mb.png)">
            <p>Powtarzanie grafiki dla całego obszaru</p>
        </div>
        <div style="background:url(mb.png);background-repeat:repeat-y;background-color:#ffff99;">
            <p>Powtarzanie grafiki w pionie</p>
        </div>
        <div style="background:url(mb.png);background-repeat:repeat-x;background-color:#ffff99;">
            <p>Powtarzanie grafiki w poziomie</p>
        </div>
        <div style="background:url(mb.png);background-repeat:no-repeat;background-size:400px 120px;background-color:#ffff99;background-position:center;">
            <p>Grafika centrowana o danej wielkości</p>
        </div>
    </body>
</html>
